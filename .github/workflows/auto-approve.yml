name: Auto-approve Release PRs
on:
  pull_request:
    types: ['opened', 'reopened', 'edited', 'synchronize']
    branches:
      - master
concurrency:
  group: auto-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true
# Lock the default GITHUB_TOKEN to no permissions so any accidental use of
# `${{ github.token }}` fails loudly instead of silently approving as github-actions[bot].
# All API calls in this workflow use JENKINS_GITHUB_TOKEN explicitly.
permissions: {}
env:
  # Only PRs opened by an active member of this team are eligible for
  # auto-approval. Membership is checked via the GitHub teams API.
  ALLOWED_TEAM: hivemq-team-pd
  # Anchored ERE. Every changed file must match at least one pattern here.
  # A release PR only bumps the version in gradle.properties.
  ALLOWED_FILES: |
    ^gradle\.properties$
  # Anchored ERE. Every added/removed line in the diff must match at least
  # one pattern here: the version line, where only the value may differ.
  # This restricts auto-approval to a version bump. Do not weaken the anchors
  # or this becomes a bypass.
  ALLOWED_LINES: |
    ^version=[0-9]+\.[0-9]+\.[0-9]+(-SNAPSHOT|-beta)?$
jobs:
  auto-approve:
    name: Evaluate auto-approve eligibility
    runs-on: ubuntu-latest
    # Skip for fork PRs: secrets are not exposed to forked-repo workflows,
    # so JENKINS_GITHUB_TOKEN would be empty and the dismiss step would fail
    # auth and block the PR. The status aggregator treats "skipped" as pass.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check team membership
        id: team-check
        env:
          GH_TOKEN: ${{ secrets.JENKINS_GITHUB_TOKEN }}
          USER_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -uo pipefail
          state=$(gh api \
            "/orgs/hivemq/teams/$ALLOWED_TEAM/memberships/$USER_LOGIN" \
            --jq '.state' 2>/dev/null || echo "")
          if [ "$state" = "active" ]; then
            echo "isTeamMember=true" >> "$GITHUB_OUTPUT"
            echo "User $USER_LOGIN is an active member of $ALLOWED_TEAM."
          else
            echo "isTeamMember=false" >> "$GITHUB_OUTPUT"
            echo "User $USER_LOGIN is not an active member of $ALLOWED_TEAM (state: ${state:-none})."
          fi

      - name: Check changed files and lines against allowlist
        id: diff-check
        if: steps.team-check.outputs.isTeamMember == 'true'
        env:
          GH_TOKEN: ${{ secrets.JENKINS_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          unapproved=false
          # Gate 1: every changed file must match an ALLOWED_FILES pattern.
          files=$(gh pr diff "$PR_NUMBER" --name-only --repo "$GITHUB_REPOSITORY")
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            matched=false
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              if [[ "$f" =~ $pattern ]]; then matched=true; break; fi
            done <<< "$ALLOWED_FILES"
            if ! $matched; then
              echo "Disallowed file: $f"
              unapproved=true
            fi
          done <<< "$files"
          # Gate 2: every added/removed content line must match an ALLOWED_LINES pattern.
          had_change=false
          while IFS= read -r line; do
            case "$line" in
              '+++ '*|'--- '*) continue ;;
            esac
            had_change=true
            content="${line:1}"
            lmatched=false
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              if [[ "$content" =~ $pattern ]]; then lmatched=true; break; fi
            done <<< "$ALLOWED_LINES"
            if ! $lmatched; then
              echo "Disallowed changed line: $line"
              unapproved=true
            fi
          done < <(gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" | grep -E '^[+-]' || true)
          if ! $had_change; then
            echo "No changed lines detected; not eligible for auto-approval."
            unapproved=true
          fi
          if $unapproved; then
            echo "unapproved=true" >> "$GITHUB_OUTPUT"
          else
            echo "unapproved=false" >> "$GITHUB_OUTPUT"
            echo "Only allowed release-bump files and lines were changed."
          fi

      - name: Auto approve
        if: |
          steps.team-check.outputs.isTeamMember == 'true' &&
          steps.diff-check.outputs.unapproved == 'false'
        env:
          GH_TOKEN: ${{ secrets.JENKINS_GITHUB_TOKEN }}
          JENKINS_USERNAME: ${{ secrets.JENKINS_GITHUB_USERNAME }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          existing=$(gh api --paginate \
            "/repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/reviews" \
            | jq --arg user "$JENKINS_USERNAME" \
                 '[.[] | select(.user.login == $user and .state == "APPROVED")] | length')
          if [ "$existing" -gt 0 ]; then
            echo "$JENKINS_USERNAME already has an active approval; skipping."
            exit 0
          fi
          gh pr review "$PR_NUMBER" \
            --approve \
            --body "Auto-approved: PR author is a member of $ALLOWED_TEAM and only allowed release-bump files and lines were changed." \
            --repo "$GITHUB_REPOSITORY"

      - name: Dismiss stale auto-approvals
        if: |
          always() &&
          (steps.team-check.outputs.isTeamMember != 'true' ||
           steps.diff-check.outputs.unapproved != 'false')
        env:
          JENKINS_USERNAME: ${{ secrets.JENKINS_GITHUB_USERNAME }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ secrets.JENKINS_GITHUB_TOKEN }}
          script: |
            const username = process.env.JENKINS_USERNAME;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const stale = reviews.filter(r =>
              r.user.login === username && r.state === 'APPROVED'
            );
            for (const review of stale) {
              await github.rest.pulls.dismissReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                review_id: review.id,
                message: 'Auto-approval dismissed: PR no longer meets auto-approve criteria (team membership or changed-scope changed).',
              });
            }

  status:
    name: Auto-approve Release PRs
    needs: [auto-approve]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify auto-approve job result
        run: |
          result="${{ needs.auto-approve.result }}"
          echo "auto-approve job result: $result"
          if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
            exit 0
          fi
          exit 1
